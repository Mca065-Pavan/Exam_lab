apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-cicd-app
  labels:
    app: java-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-cicd-app
  template:
    metadata:
      labels:
        app: java-cicd-app
    spec:
      containers:
        - name: java-cicd-app
          image: pavan/java-cicd-app:latest
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: java-cicd-service
spec:
  type: NodePort
  selector:
    app: java-cicd-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
