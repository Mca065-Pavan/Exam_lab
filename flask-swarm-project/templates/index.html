<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 80px; background: #0f0c29; color: white; }
        .card { background: #302b63; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: #24c6dc; }
        .status { color: #5cd85c; font-size: 20px; margin: 15px 0; }
        .tech { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Flask CI/CD Pipeline Demo</h1>
        <p class="status">Application is Running Successfully!</p>
        <p class="tech">Built with Flask | Containerized with Docker</p>
        <p class="tech">Deployed on Docker Swarm via Jenkins CI/CD</p>
        <p class="tech">Last deployed: {{ timestamp }}</p>
    </div>
</body>
</html>
